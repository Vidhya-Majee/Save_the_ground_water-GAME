<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Water Management Quiz</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2fe;
            --secondary: #4facfe;
            --bg-dark: #0f172a;
            --glass-bg: rgba(15, 23, 42, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Poppins', sans-serif;
            text-align: center;
            background: linear-gradient(rgba(15, 23, 42, 0.5), rgba(15, 23, 42, 0.75)), url('assets/surplus.webp') no-repeat center center/cover;
            color: #f1f5f9;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
        }

        .game-container {
            width: 100%;
            max-width: 500px;
            padding: 35px 30px;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        h2 {
            font-family: 'Outfit', sans-serif;
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(to right, #00f2fe, #4facfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .question {
            font-size: 1.15rem;
            line-height: 1.6;
            margin-bottom: 15px;
            color: #cbd5e1;
            font-weight: 400;
        }

        .buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 15px;
        }

        .buttons button {
            padding: 14px 20px;
            font-size: 1rem;
            font-family: 'Poppins', sans-serif;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            background-color: rgba(255, 255, 255, 0.05);
            color: white;
            transition: all 0.25s ease;
            text-align: center;
        }

        .buttons button:hover:not(:disabled) {
            background-color: rgba(255, 255, 255, 0.15);
            border-color: var(--primary);
            transform: translateY(-2px);
        }

        .buttons button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        #nextBtn, #learnMoreBtn, #dashboardBtn {
            padding: 14px;
            font-size: 1rem;
            font-weight: bold;
            font-family: 'Outfit', sans-serif;
            cursor: pointer;
            border: none;
            border-radius: 30px;
            transition: all 0.25s ease;
            margin-top: 10px;
        }

        #nextBtn {
            background: linear-gradient(135deg, #007bff, #0056b3);
            color: white;
            box-shadow: 0 4px 12px rgba(0, 123, 255, 0.3);
        }

        #nextBtn:disabled {
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.3);
            box-shadow: none;
            cursor: not-allowed;
        }

        #nextBtn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0, 123, 255, 0.5);
        }

        #learnMoreBtn {
            background: linear-gradient(135deg, #ff9800, #e68900);
            color: white;
            box-shadow: 0 4px 12px rgba(255, 152, 0, 0.3);
        }

        #learnMoreBtn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(255, 152, 0, 0.5);
        }

        #dashboardBtn {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
        }

        #dashboardBtn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(16, 185, 129, 0.5);
        }

        #message {
            font-weight: bold;
            font-size: 1.1rem;
            margin: 5px 0;
        }

        #explanation {
            font-size: 0.9rem;
            color: #94a3b8;
            line-height: 1.5;
            background: rgba(255, 255, 255, 0.02);
            padding: 10px 15px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: none;
        }

        #explanation:not(:empty) {
            display: block;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h2>Water Management Quiz</h2>
        <p class="question" id="question">Loading...</p>
        <div class="buttons">
            <button onclick="checkAnswer(0)" id="btn0">Option 1</button>
            <button onclick="checkAnswer(1)" id="btn1">Option 2</button>
            <button onclick="checkAnswer(2)" id="btn2">Option 3</button>
        </div>
        <p id="message"></p>
        <p id="explanation"></p>
        <p>Score: <span id="score">0</span></p>
        <button onclick="nextQuestion()" id="nextBtn" disabled>Next Question</button>
        <button id="learnMoreBtn" onclick="window.location.href='surplus_rainwater.html'">Learn About Rainwater Harvesting</button>
        <button id="dashboardBtn" onclick="window.location.href='second/dashboard.html'" style="display: none; background-color: #007bff; color: white;">Return to Dashboard</button>
    </div>

    <script>
        let score = 0;
        let currentQuestionIndex = 0;
        const questions = [
            { 
                question: "What is the best way to conserve water?", 
                options: ["Leave taps running", "Use rainwater harvesting", "Waste water unnecessarily"], 
                correct: 1,
                explanation: "Rainwater harvesting helps store water for future use and reduces wastage."
            },
            { 
                question: "Which method helps reduce drought effects?", 
                options: ["Deforestation", "Overuse of groundwater", "Planting more trees"], 
                correct: 2,
                explanation: "Planting trees helps maintain soil moisture and prevent desertification."
            },
            { 
                question: "What should be done during a drought?", 
                options: ["Store and use water wisely", "Ignore water shortage", "Use water irresponsibly"], 
                correct: 0,
                explanation: "Managing water efficiently ensures availability during prolonged dry periods."
            },
            { 
                question: "What is a major problem caused by surplus rain?", 
                options: ["Flooding", "More drinking water", "Better agriculture"], 
                correct: 0,
                explanation: "Excessive rainfall can cause flooding, which damages infrastructure and displaces people."
            },
            { 
                question: "Which method can help store surplus rainwater?", 
                options: ["Let it flow away", "Rainwater harvesting", "Burn it off"], 
                correct: 1,
                explanation: "Rainwater harvesting helps in storing excess water for future use."
            },
            { 
                question: "How can we use surplus rainwater effectively?", 
                options: ["Dump it in the ocean", "Store it in tanks and reservoirs", "Let it evaporate"], 
                correct: 1,
                explanation: "Storing rainwater in tanks and reservoirs helps in water conservation."
            }
        ];

        function loadQuestion() {
            document.getElementById("question").textContent = questions[currentQuestionIndex].question;
            const buttons = document.querySelectorAll(".buttons button");
            questions[currentQuestionIndex].options.forEach((option, index) => {
                buttons[index].textContent = option;
                buttons[index].disabled = false;
            });
            document.getElementById("nextBtn").disabled = true;
            document.getElementById("message").textContent = "";
            document.getElementById("explanation").textContent = "";
        }

        function checkAnswer(selected) {
            const buttons = document.querySelectorAll(".buttons button");
            buttons.forEach(btn => btn.disabled = true);
            if (selected === questions[currentQuestionIndex].correct) {
                score += 10;
                document.getElementById("message").textContent = "Correct! +10 points";
            } else {
                score -= 5;
                document.getElementById("message").textContent = "Wrong! -5 points";
            }
            document.getElementById("explanation").textContent = "Correct Answer: " + questions[currentQuestionIndex].options[questions[currentQuestionIndex].correct] + " - " + questions[currentQuestionIndex].explanation;
            document.getElementById("score").textContent = score;
            document.getElementById("nextBtn").disabled = false;
        }

        function nextQuestion() {
            currentQuestionIndex++;
            if (currentQuestionIndex < questions.length) {
                loadQuestion();
            } else {
                document.getElementById("message").textContent = "Quiz Over! Final Score: " + score;
                
                // Disable option buttons and next button, leaving learnMore & dashboard buttons active
                document.querySelectorAll(".buttons button, #nextBtn").forEach(btn => btn.disabled = true);
                
                const learnBtn = document.getElementById("learnMoreBtn");
                const dashBtn = document.getElementById("dashboardBtn");
                
                learnBtn.style.display = "inline-block";
                learnBtn.disabled = false;
                dashBtn.style.display = "inline-block";
                dashBtn.disabled = false;

                // Unlock level 3 (more_groundwater)
                let unlockedLevels = JSON.parse(localStorage.getItem("unlockedLevels")) || ["rainwater"];
                if (!unlockedLevels.includes("more_groundwater")) {
                    unlockedLevels.push("more_groundwater");
                    localStorage.setItem("unlockedLevels", JSON.stringify(unlockedLevels));
                }

                // Save score to leaderboard
                let playerName = localStorage.getItem("playerName") || "Anonymous";
                let currentHighScore = parseInt(localStorage.getItem(`highScore_${playerName}`)) || 0;
                if (score > currentHighScore) {
                    localStorage.setItem(`highScore_${playerName}`, score);
                }

                let leaderboardData = JSON.parse(localStorage.getItem("leaderboardData")) || [];
                let existing = leaderboardData.find(p => p.name === playerName);
                if (existing) {
                    if (score > existing.score) {
                        existing.score = score;
                    }
                } else {
                    leaderboardData.push({ name: playerName, score: score });
                }
                leaderboardData.sort((a, b) => b.score - a.score);
                leaderboardData = leaderboardData.slice(0, 10);
                localStorage.setItem("leaderboardData", JSON.stringify(leaderboardData));
            }
        }

        loadQuestion();
    </script>
</body>
</html>
