<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loader Page</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #090d16 0%, #152035 100%);
            color: #f1f5f9;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
        }
        .loader {
            display: flex;
            font-size: 2.5em;
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            margin-bottom: 10px;
        }
        .word {
            opacity: 0;
            animation: fadeIn 0.8s forwards;
            margin: 0 6px;
            background: linear-gradient(to right, #00f2fe, #4facfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 4px 15px rgba(0, 242, 254, 0.15);
        }
        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(15px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .word:nth-child(1) { animation-delay: 0s; }
        .word:nth-child(2) { animation-delay: 0.3s; }
        .word:nth-child(3) { animation-delay: 0.6s; }
        .word:nth-child(4) { animation-delay: 0.9s; }
        .word:nth-child(5) { animation-delay: 1.2s; }
        .credit {
            margin-top: 15px;
            font-size: 0.9em;
            color: #94a3b8;
            font-weight: 300;
            letter-spacing: 1px;
            text-transform: uppercase;
            animation: pulse 2s infinite ease-in-out;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="loader">
        <div class="word">Save</div>
        <div class="word">The</div>
        <div class="word">Ground</div>
        <div class="word">Water</div>
        <div class="word">Game</div>
    </div>
    <div class="credit">Presented by Warrior Force</div>

    <script>
        // 3 seconds ke baad next page par jana
        setTimeout(function() {
            window.location.href = 'index.html'; // Yahan 'nextpage.html' ki jagah apni next page ka naam daalein
        }, 3000); // 3000 milliseconds = 3 seconds
    </script>
</body>
</html>
