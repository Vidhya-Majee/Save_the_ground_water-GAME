<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Save the Groundwater - Leaderboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2fe;
            --secondary: #4facfe;
            --bg-dark: #0f172a;
            --glass-bg: rgba(15, 23, 42, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(rgba(15, 23, 42, 0.5), rgba(15, 23, 42, 0.75)), url('assets/backgr.webp') no-repeat center center/cover;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Poppins', sans-serif;
            color: #f1f5f9;
            padding: 20px;
        }

        .title {
            font-family: 'Outfit', sans-serif;
            font-size: 3.5rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: linear-gradient(to right, #00f2fe 0%, #4facfe 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 4px 20px rgba(0, 242, 254, 0.2);
            text-align: center;
            margin-bottom: 25px;
        }

        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 35px 30px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        h2 {
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            margin-bottom: 20px;
            color: #cbd5e1;
            font-size: 1.5rem;
            border-bottom: 1.5px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 10px;
        }

        ul {
            list-style: none;
            padding: 0;
            margin: 0 0 30px 0;
            max-height: 250px;
            overflow-y: auto;
            text-align: left;
        }

        li {
            padding: 12px 15px;
            margin-bottom: 10px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.05rem;
        }

        li:nth-child(1) {
            background: rgba(250, 204, 21, 0.1);
            border-color: rgba(250, 204, 21, 0.3);
        }

        li:nth-child(2) {
            background: rgba(226, 232, 240, 0.08);
            border-color: rgba(226, 232, 240, 0.2);
        }

        li:nth-child(3) {
            background: rgba(205, 127, 50, 0.1);
            border-color: rgba(205, 127, 50, 0.2);
        }

        .rank {
            font-weight: 800;
            font-family: 'Outfit', sans-serif;
            width: 30px;
        }

        .name {
            flex-grow: 1;
            margin-left: 10px;
            font-weight: 500;
        }

        .score {
            font-weight: 800;
            color: var(--primary);
            font-family: 'Outfit', sans-serif;
        }

        .buttons-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        button {
            width: 100%;
            padding: 14px;
            font-size: 1.1rem;
            font-weight: bold;
            font-family: 'Outfit', sans-serif;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.25s ease;
        }

        .start-btn {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.35);
        }

        .start-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(16, 185, 129, 0.5);
        }

        .back-btn {
            background: rgba(255, 255, 255, 0.05);
            color: #cbd5e1;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-1px);
        }
    </style>
</head>
<body>
    <h1 class="title">LEADERBOARD</h1>
    
    <div class="card">
        <h2>Top Conservers</h2>
        <ul id="leaderboard-list">
            <!-- Dynamic data will be generated here -->
        </ul>
        <div class="buttons-container">
            <button class="start-btn" onclick="handleStartGame()">START GAME</button>
            <button class="back-btn" onclick="window.location.href='index.html?playerName=' + encodeURIComponent(playerName)">BACK TO MENU</button>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const leaderboardList = document.getElementById("leaderboard-list");

            // Fetch dynamic scores
            let leaderboardData = JSON.parse(localStorage.getItem("leaderboardData")) || [
                { name: "EcoWarrior", score: 25000 },
                { name: "RainSaver", score: 18000 },
                { name: "WaterHero", score: 12000 }
            ];

            // Render items
            leaderboardList.innerHTML = "";
            
            if (leaderboardData.length === 0) {
                leaderboardList.innerHTML = `<li style="justify-content: center; color: rgba(255,255,255,0.4)">No scores recorded yet.</li>`;
            } else {
                leaderboardData.forEach((entry, idx) => {
                    let rankSymbol = `#${idx + 1}`;
                    if (idx === 0) rankSymbol = "🥇";
                    else if (idx === 1) rankSymbol = "🥈";
                    else if (idx === 2) rankSymbol = "🥉";

                    const li = document.createElement("li");
                    li.innerHTML = `
                        <span class="rank">${rankSymbol}</span>
                        <span class="name">${entry.name}</span>
                        <span class="score">${entry.score} mL/pts</span>
                    `;
                    leaderboardList.appendChild(li);
                });
            }
        });

        const urlParams = new URLSearchParams(window.location.search);
        const playerName = urlParams.get('playerName') || localStorage.getItem("playerName") || "";

        function handleStartGame() {
            if (playerName) {
                window.location.href = "second/dashboard.html?playerName=" + encodeURIComponent(playerName);
            } else {
                window.location.href = "index.html";
            }
        }
    </script>
</body>
</html>
