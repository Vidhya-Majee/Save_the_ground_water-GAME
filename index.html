<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Save the Groundwater</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2fe;
            --secondary: #4facfe;
            --accent: #10b981;
            --bg-dark: #0f172a;
            --glass-bg: rgba(15, 23, 42, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(rgba(15, 23, 42, 0.5), rgba(15, 23, 42, 0.7)), url('assets/backgr.webp') no-repeat center center/cover;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Poppins', sans-serif;
            color: #f1f5f9;
            padding: 20px;
            overflow: hidden;
        }

        .title {
            font-family: 'Outfit', sans-serif;
            font-size: 3.5rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: linear-gradient(to right, #00f2fe 0%, #4facfe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 4px 20px rgba(0, 242, 254, 0.2);
            text-align: center;
            margin-bottom: 30px;
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px 30px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            width: 100%;
            max-width: 450px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .name-input-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 10px;
        }

        .name-input-container input {
            padding: 15px 20px;
            font-size: 1.1rem;
            border-radius: 30px;
            border: 1.5px solid rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.05);
            color: white;
            text-align: center;
            outline: none;
            transition: all 0.3s ease;
            font-family: 'Poppins', sans-serif;
        }

        .name-input-container input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .name-input-container input:focus {
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.25);
        }

        .name-input-container button {
            padding: 14px;
            font-size: 1.1rem;
            font-weight: bold;
            font-family: 'Outfit', sans-serif;
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.3);
            border: none;
            border-radius: 30px;
            cursor: not-allowed;
            transition: all 0.3s ease;
        }

        .name-input-container button.enabled {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: #0f172a;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 242, 254, 0.35);
        }

        .name-input-container button.enabled:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 242, 254, 0.5);
        }

        .welcome-message {
            font-size: 1.25rem;
            line-height: 1.6;
            margin-bottom: 25px;
            display: none;
            color: #cbd5e1;
        }

        .buttons {
            display: none;
            flex-direction: column;
            gap: 12px;
        }

        button.action-btn {
            display: block;
            width: 100%;
            padding: 15px 25px;
            font-size: 1.1rem;
            font-weight: 700;
            font-family: 'Outfit', sans-serif;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
        }

        .start-btn {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
        }

        .start-btn:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 8px 20px rgba(16, 185, 129, 0.5);
        }

        .leaderboard-btn {
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            color: white;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
        }

        .leaderboard-btn:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 8px 20px rgba(59, 130, 246, 0.5);
        }

        .change-name-btn {
            background: rgba(239, 68, 68, 0.1);
            color: #f87171;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .change-name-btn:hover {
            background: rgba(239, 68, 68, 0.2);
            transform: translateY(-1px);
        }

        .back-btn {
            background: rgba(255, 255, 255, 0.05);
            color: #cbd5e1;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-1px);
        }
    </style>
</head>
<body>
    <h1 class="title">SAVE THE GROUNDWATER</h1>
    
    <div class="card">
        <!-- Input Screen -->
        <div class="name-input-container" id="nameInputContainer">
            <p style="margin-bottom: 10px; color: #94a3b8; font-size: 0.95rem;">Enter your player name to begin the conservation journey:</p>
            <input type="text" id="playerName" placeholder="Enter your name" oninput="toggleSubmitButton()">
            <button id="submitButton" onclick="saveName()" disabled>Submit</button>
        </div>

        <!-- Welcome Info -->
        <div class="welcome-message" id="welcomeMessage"></div>

        <!-- Dashboard buttons -->
        <div class="buttons" id="gameButtons">
            <button class="action-btn start-btn" onclick="gotodashboard()">START GAME</button>
            <button class="action-btn leaderboard-btn" onclick="toggleLeaderboard()">LEADERBOARD</button>
            <button class="action-btn change-name-btn" onclick="resetName()">Change Name</button>
            <button class="action-btn back-btn" onclick="goBackToMenu()">Back to Menu</button>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const savedName = localStorage.getItem("playerName");
            if (savedName) {
                let highScore = localStorage.getItem(`highScore_${savedName}`) || 0;
                document.getElementById("playerName").value = savedName;
                document.getElementById("nameInputContainer").style.display = "none";
                document.getElementById("gameButtons").style.display = "flex";
                document.getElementById("welcomeMessage").innerHTML = `Welcome back, <strong>${savedName}</strong>!<br>High Score: <span style="color: #00d2ff; font-weight: bold;">${highScore} mL/pts</span>`;
                document.getElementById("welcomeMessage").style.display = "block";
            }
        });

        function gotodashboard() {
            window.location.href = "second/dashboard.html";
        }

        function saveName() {
            const name = document.getElementById("playerName").value.trim();
            if (name) {
                let highScore = localStorage.getItem(`highScore_${name}`) || 0;
                localStorage.setItem("playerName", name);
                
                // Initialize unlockedLevels if empty
                if (!localStorage.getItem("unlockedLevels")) {
                    localStorage.setItem("unlockedLevels", JSON.stringify(["rainwater"]));
                }

                document.getElementById("nameInputContainer").style.display = "none";
                document.getElementById("gameButtons").style.display = "flex";
                document.getElementById("welcomeMessage").innerHTML = `Welcome, <strong>${name}</strong>!<br>High Score: <span style="color: #00d2ff; font-weight: bold;">${highScore} mL/pts</span>`;
                document.getElementById("welcomeMessage").style.display = "block";
            }
        }

        function toggleSubmitButton() {
            const name = document.getElementById("playerName").value.trim();
            const button = document.getElementById("submitButton");
            button.disabled = name === "";
            button.classList.toggle("enabled", name !== "");
        }

        function resetName() {
            localStorage.removeItem("playerName");
            document.getElementById("gameButtons").style.display = "none";
            document.getElementById("welcomeMessage").style.display = "none";
            document.getElementById("nameInputContainer").style.display = "flex";
            document.getElementById("playerName").value = "";
            toggleSubmitButton();
        }

        function toggleLeaderboard() {
            window.location.href = 'leaderboard.html';
        }

        function goBackToMenu() {
            document.getElementById("gameButtons").style.display = "none";
            document.getElementById("welcomeMessage").style.display = "none";
            document.getElementById("nameInputContainer").style.display = "flex";
            document.getElementById("playerName").value = "";
            toggleSubmitButton();
        }
    </script>
</body>
</html>
